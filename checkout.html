<!DOCTYPE html>
<html lang="en">
<head>
  <title>Checkout EcoGrow</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
    }

    .card:hover {
      transform: scale(1.03);
      transition: 0.3s;
    }
        
    /* sembunyikan radio */
    input[type="radio"] {
    display: none;
    }

    /* tombol awal */
    .btn-pilih {
    border: 2px solid #28a745;
    color: #28a745;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    display: block;
    }

/* saat dipilih */
    input[type="radio"]:checked + label {
    background-color: #28a745;
    color: white;
    }
    .card-img-top {
    height: 270px;      /* ubah sesuai kebutuhan */
    }
  </style>
</head>

<body>

<div class="container mt-5">
<a href="ETS2.html" class="btn btn-outline-dark mb-3">
  ← Kembali
</a>
  <h2 class="text-center mb-4">Pilih Paket EcoGrow</h2>

  <div class="row text-center">
    <div class="row text-center">

  <!-- PAKET 1 -->
  <div class="col-md-4">
    <div class="card shadow p-3">
      <h4>Basic</h4>
      <img src="gpt1.png" class="card-img-top" alt="EcoGrow 1kg">
      <p>EcoGrow 1kg</p>
      <h5 class="text-success">Rp25.000</h5>

      <input type="radio" name="paket" id="paket1">
      <label for="paket1" class="btn-pilih mt-2">Pilih</label>
    </div>
  </div>

  <!-- PAKET 2 -->
  <div class="col-md-4">
    <div class="card shadow p-3">
      <h4>Best Seller</h4>
      <img src="gpt2.png" class="card-img-top" alt="EcoGrow 2kg">
      <p>EcoGrow 2kg</p>
      <h5 class="text-success">Rp45.000</h5>

      <input type="radio" name="paket" id="paket2">
      <label for="paket2" class="btn-pilih mt-2">Pilih</label>
    </div>
  </div>

  <!-- PAKET 3 -->
  <div class="col-md-4">
    <div class="card shadow p-3">
      <h4>Hemat</h4>
      <img src="gpt.png" class="card-img-top" alt="EcoGrow 5kg">
      <p>EcoGrow 5kg</p>
      <h5 class="text-success">Rp100.000</h5>

      <input type="radio" name="paket" id="paket3">
      <label for="paket3" class="btn-pilih mt-2">Pilih</label>
    </div>
  </div>

  <!-- CHECKOUT -->
  <div class="row justify-content-center mt-5">
    <div class="col-md-6">

      <div class="card shadow p-4">
        <h3 class="text-center mb-3">Checkout</h3>

        <form>
          <div class="mb-3">
            <label>Nama</label>
            <input type="text" class="form-control" placeholder="Nama lengkap">
          </div>

          <div class="mb-3">
            <label>Alamat</label>
            <textarea class="form-control" rows="3"></textarea>
          </div>


          <div class="mb-3">
            <label>Jumlah</label>
            <input type="number" class="form-control">
          </div>

          <div class="mb-3">
            <label>Pembayaran</label>
            <select class="form-control">
              <option>Transfer Bank</option>
              <option>COD</option>
              <option>E-Wallet</option>
            </select>
          </div>

          <div class="alert alert-success text-center">
            Total: <strong>Rp -</strong>
          </div>

          <a href="trimakasih.html" class="btn btn-success w-100">
            Checkout Sekarang
          </a>

        </form>

      </div>

    </div>
  </div>

</div>

</body>
</html>
